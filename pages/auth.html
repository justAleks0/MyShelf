<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyShelf - Sign In</title>
    <script>
    (function(){
      var p=location.pathname||'/';
      var b='/';
      if(p!=='/'&&!p.startsWith('/pages')){var m=p.match(/^\/([^/]+)/);if(m)b='/'+m[1]+'/';}
      window.MYSHELF_BASE=b.replace(/\/$/,'')||'';
      document.write('<base href="'+b+'">');
      document.write('<link rel="icon" href="'+b+'favicon.ico">');
      document.write('<link rel="stylesheet" href="'+b+'css/styles.css">');
    })();
    </script>
    <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('myshelf-theme') || 'dark');</script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <img src="logo.png" alt="MyShelf" class="auth-logo">
                <h1>MyShelf</h1>
                <p>Your personal collection showcase</p>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form">
                <h2>Welcome Back</h2>
                
                <button type="button" class="btn btn-google btn-full" id="google-signin">
                    <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>

                <div class="auth-divider">
                    <span>or</span>
                </div>
                
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <input type="email" id="login-email" required placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <input type="password" id="login-password" required placeholder="Your password">
                </div>

                <div class="error-message" id="login-error"></div>

                <button type="submit" class="btn btn-primary btn-full">Sign In</button>

                <p class="auth-switch">
                    Don't have an account? <a href="#" id="show-signup">Sign up</a>
                </p>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="auth-form" style="display: none;">
                <h2>Create Account</h2>
                
                <button type="button" class="btn btn-google btn-full" id="google-signup">
                    <svg class="google-icon" viewBox="0 0 24 24" width="20" height="20">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continue with Google
                </button>

                <div class="auth-divider">
                    <span>or</span>
                </div>
                
                <div class="form-group">
                    <label for="signup-name">Display Name</label>
                    <input type="text" id="signup-name" required placeholder="Your name">
                </div>

                <div class="form-group">
                    <label for="signup-email">Email</label>
                    <input type="email" id="signup-email" required placeholder="you@example.com">
                </div>

                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <input type="password" id="signup-password" required placeholder="Min. 6 characters" minlength="6">
                </div>

                <div class="form-group">
                    <label for="signup-confirm">Confirm Password</label>
                    <input type="password" id="signup-confirm" required placeholder="Confirm password">
                </div>

                <div class="error-message" id="signup-error"></div>

                <button type="submit" class="btn btn-primary btn-full">Create Account</button>

                <p class="auth-switch">
                    Already have an account? <a href="#" id="show-login">Sign in</a>
                </p>
            </form>
        </div>
    </div>

    <script data-main="auth.js">
    (function(){
      var b=window.MYSHELF_BASE||'';
      document.querySelectorAll('a[href="."],a[href="/"]').forEach(function(a){a.href=b?b+'/':'/';});
      document.querySelectorAll('a[href^="pages/"]').forEach(function(a){a.href=(b?b+'/':'/')+a.getAttribute('href');});
      document.querySelectorAll('img.brand-logo,img.auth-logo').forEach(function(img){img.src=(b?b+'/':'/')+'logo.png';});
      var m=document.currentScript.getAttribute('data-main');if(m){var s=document.createElement('script');s.type='module';s.src=(b?b+'/':'/')+'js/'+m;document.body.appendChild(s);}
    })();
    </script>
</body>
</html>
